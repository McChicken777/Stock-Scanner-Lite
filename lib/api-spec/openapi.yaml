openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Warehouse Stock Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: locations
    description: Storage location operations
  - name: products
    description: Product management
  - name: stock
    description: Stock management
  - name: history
    description: Change history log
  - name: alerts
    description: Low stock alerts
  - name: customers
    description: Customer directory
  - name: quotes
    description: Quotes / estimates that convert into work orders
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all storage locations
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a storage location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequest"
      responses:
        "201":
          description: Created location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"

  /locations/{locationId}:
    get:
      operationId: getLocation
      tags: [locations]
      summary: Get a location with its stock
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Location with stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationWithStock"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete a storage location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithStock"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/categories:
    get:
      operationId: listProductCategories
      tags: [products]
      summary: List distinct non-empty product categories for the company
      responses:
        "200":
          description: Sorted list of category strings
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Bulk import products from CSV rows (admin/owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ImportProductRow"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductResult"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductWithStock"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stock/{locationId}:
    get:
      operationId: getStockAtLocation
      tags: [stock]
      summary: Get all stock at a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock at location
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockEntry"

  /stock/{locationId}/{productId}:
    put:
      operationId: updateStock
      tags: [stock]
      summary: Update stock quantity at a location
      parameters:
        - name: locationId
          in: path
          required: true
          schema:
            type: string
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStockRequest"
      responses:
        "200":
          description: Updated stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockUpdateResult"
        "400":
          description: Bad request (e.g. negative stock)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List stock change history
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: locationId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: History entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  /stock/valuation:
    get:
      operationId: getStockValuation
      tags: [stock]
      summary: Total inventory value and per-category breakdown
      responses:
        "200":
          description: Stock valuation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockValuation"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List customers for the current company
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{customerId}/quotes:
    parameters:
      - in: path
        name: customerId
        required: true
        schema: { type: integer }
    get:
      operationId: listCustomerQuotes
      tags: [customers]
      summary: List quotes belonging to a single customer
      responses:
        "200":
          description: Quotes for the customer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteSummary"

  /quotes/counts:
    get:
      operationId: getQuoteCounts
      tags: [quotes]
      summary: Counts of quotes grouped by status (for dashboard)
      responses:
        "200":
          description: Counts keyed by status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteStatusCounts"

  /customers/{customerId}:
    parameters:
      - in: path
        name: customerId
        required: true
        schema: { type: integer }
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a single customer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    put:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: List quotes (filterable by status, customerId, workProjectId, from, to)
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [draft, sent, approved, rejected, converted]
        - in: query
          name: customerId
          schema: { type: integer }
        - in: query
          name: workProjectId
          schema: { type: integer }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuoteSummary"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a quote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{quoteId}:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: integer }
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get a quote with items, customer and revisions
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteFull"
    put:
      operationId: updateQuote
      tags: [quotes]
      summary: Update a quote (only when not converted)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteRequest"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: Delete a quote (only when not converted)
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /quotes/{quoteId}/status:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: integer }
    put:
      operationId: setQuoteStatus
      tags: [quotes]
      summary: Transition quote status (draft → sent → approved/rejected)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetQuoteStatusRequest"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /quotes/{quoteId}/convert:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: integer }
    post:
      operationId: convertQuoteToWorkProject
      tags: [quotes]
      summary: Convert an approved quote to a work project (idempotent within a quote)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertQuoteRequest"
      responses:
        "201":
          description: Conversion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  quote: { $ref: "#/components/schemas/Quote" }
                  project:
                    type: object
                    properties:
                      id: { type: integer }
                      name: { type: string }
                    required: [id, name]
                required: [quote, project]

  /quotes/{quoteId}/pdf:
    parameters:
      - in: path
        name: quoteId
        required: true
        schema: { type: integer }
    get:
      operationId: getQuotePdf
      tags: [quotes]
      summary: Download a PDF of the quote
      responses:
        "200":
          description: PDF document
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [alerts]
      summary: Get dashboard summary with low stock alerts
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Location:
      type: object
      properties:
        id:
          type: string
          description: Location ID e.g. A1-01-02
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - createdAt

    CreateLocationRequest:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
          nullable: true
      required:
        - id

    LocationWithStock:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        stock:
          type: array
          items:
            $ref: "#/components/schemas/StockEntry"
      required:
        - id
        - createdAt
        - stock

    ItemType:
      type: string
      enum:
        - purchased_part
        - manufactured_part
        - final_product
        - purchase
        - production

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        itemType:
          $ref: "#/components/schemas/ItemType"
        bufferStock:
          type: integer
          description: Minimum required quantity
        targetStock:
          type: integer
        alertEmail:
          type: string
          nullable: true
        supplierId:
          type: integer
          nullable: true
        supplierSku:
          type: string
          nullable: true
        supplierProductName:
          type: string
          nullable: true
        unitCost:
          type: number
          description: Per-unit cost used for stock valuation
        salePrice:
          type: number
          description: Per-unit sale price used for revenue and margin
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - category
        - itemType
        - bufferStock
        - targetStock
        - unitCost
        - salePrice
        - createdAt

    ProductWithStock:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        itemType:
          $ref: "#/components/schemas/ItemType"
        bufferStock:
          type: integer
        targetStock:
          type: integer
        alertEmail:
          type: string
          nullable: true
        supplierId:
          type: integer
          nullable: true
        supplierSku:
          type: string
          nullable: true
        supplierProductName:
          type: string
          nullable: true
        unitCost:
          type: number
        salePrice:
          type: number
        createdAt:
          type: string
          format: date-time
        totalStock:
          type: integer
          description: Total quantity across all locations
        isLowStock:
          type: boolean
      required:
        - id
        - name
        - category
        - itemType
        - bufferStock
        - targetStock
        - unitCost
        - createdAt
        - totalStock
        - isLowStock

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        bufferStock:
          type: integer
        alertEmail:
          type: string
          nullable: true
        unitCost:
          type: number
      required:
        - name
        - category
        - bufferStock

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        bufferStock:
          type: integer
        alertEmail:
          type: string
          nullable: true
        unitCost:
          type: number
        salePrice:
          type: number

    ImportItemType:
      type: string
      enum:
        - purchased_part
        - manufactured_part
        - final_product

    ImportProductRow:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/ImportItemType"
        category:
          type: string
        min_stock:
          type: string
        target_stock:
          type: string
        supplier_name:
          type: string
        supplier_sku:
          type: string
        alert_email:
          type: string
      required:
        - name
        - type

    ImportSkippedRow:
      type: object
      properties:
        row:
          type: integer
        reason:
          type: string
      required:
        - row
        - reason

    ImportProductResult:
      type: object
      properties:
        created:
          type: integer
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/ImportSkippedRow"
      required:
        - created
        - skipped

    StockEntry:
      type: object
      properties:
        locationId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
        productName:
          type: string
        productCategory:
          type: string
        bufferStock:
          type: integer
      required:
        - locationId
        - productId
        - quantity
        - productName
        - productCategory
        - bufferStock

    UpdateStockRequest:
      type: object
      properties:
        quantity:
          type: integer
          description: New absolute quantity
        delta:
          type: integer
          description: Relative change (positive to add, negative to remove)
        changedBy:
          type: string
          nullable: true
      required: []

    StockUpdateResult:
      type: object
      properties:
        locationId:
          type: string
        productId:
          type: integer
        quantity:
          type: integer
        totalStock:
          type: integer
        isLowStock:
          type: boolean
        alertSent:
          type: boolean
      required:
        - locationId
        - productId
        - quantity
        - totalStock
        - isLowStock
        - alertSent

    HistoryEntry:
      type: object
      properties:
        id:
          type: integer
        locationId:
          type: string
        productId:
          type: integer
        productName:
          type: string
        previousQuantity:
          type: integer
        newQuantity:
          type: integer
        delta:
          type: integer
        changedBy:
          type: string
          nullable: true
        changedAt:
          type: string
          format: date-time
      required:
        - id
        - locationId
        - productId
        - productName
        - previousQuantity
        - newQuantity
        - delta
        - changedAt

    DashboardSummary:
      type: object
      properties:
        totalLocations:
          type: integer
        totalProducts:
          type: integer
        lowStockProducts:
          type: array
          items:
            $ref: "#/components/schemas/ProductWithStock"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
      required:
        - totalLocations
        - totalProducts
        - lowStockProducts
        - recentActivity
        - categoryBreakdown

    StockValuationProduct:
      type: object
      properties:
        productId:
          type: integer
        name:
          type: string
        totalQty:
          type: integer
        unitCost:
          type: number
        salePrice:
          type: number
        totalValue:
          type: number
        totalRevenue:
          type: number
        totalMargin:
          type: number
      required:
        - productId
        - name
        - totalQty
        - unitCost
        - salePrice
        - totalValue
        - totalRevenue
        - totalMargin

    StockValuationCategory:
      type: object
      properties:
        category:
          type: string
        productCount:
          type: integer
        totalQty:
          type: integer
        totalValue:
          type: number
        totalRevenue:
          type: number
        totalMargin:
          type: number
        products:
          type: array
          items:
            $ref: "#/components/schemas/StockValuationProduct"
      required:
        - category
        - productCount
        - totalQty
        - totalValue
        - totalRevenue
        - totalMargin
        - products

    StockValuation:
      type: object
      properties:
        totalValue:
          type: number
        totalRevenue:
          type: number
        totalMargin:
          type: number
        totalQty:
          type: integer
        totalProducts:
          type: integer
        productsWithoutCost:
          type: integer
        productsWithoutSalePrice:
          type: integer
        categories:
          type: array
          items:
            $ref: "#/components/schemas/StockValuationCategory"
      required:
        - totalValue
        - totalRevenue
        - totalMargin
        - totalQty
        - totalProducts
        - productsWithoutCost
        - productsWithoutSalePrice
        - categories

    CategoryCount:
      type: object
      properties:
        category:
          type: string
        productCount:
          type: integer
        totalStock:
          type: integer
      required:
        - category
        - productCount
        - totalStock

    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        contactPerson: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, name, createdAt]

    CreateCustomerRequest:
      type: object
      properties:
        name: { type: string }
        contactPerson: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        address: { type: string, nullable: true }
        notes: { type: string, nullable: true }
      required: [name]

    QuoteSummary:
      type: object
      properties:
        id: { type: integer }
        quoteNumber: { type: string }
        status:
          type: string
          enum: [draft, sent, approved, rejected, converted]
        customerId: { type: integer, nullable: true }
        customerName: { type: string, nullable: true }
        customerNameLookup: { type: string, nullable: true }
        customerDisplayName: { type: string, nullable: true }
        total: { type: number }
        validUntil: { type: string, format: date-time, nullable: true }
        workProjectId: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, quoteNumber, status, total, createdAt, updatedAt]

    Quote:
      allOf:
        - $ref: "#/components/schemas/QuoteSummary"
        - type: object
          properties:
            customerContact: { type: string, nullable: true }
            customerEmail: { type: string, nullable: true }
            customerPhone: { type: string, nullable: true }
            customerAddress: { type: string, nullable: true }
            notes: { type: string, nullable: true }
            terms: { type: string, nullable: true }
            subtotal: { type: number }
            discount: { type: number }
            taxRate: { type: number }
            taxAmount: { type: number }

    QuoteItem:
      type: object
      properties:
        id: { type: integer }
        productId: { type: integer, nullable: true }
        name: { type: string }
        description: { type: string, nullable: true }
        quantity: { type: number }
        unitPrice: { type: number }
        lineTotal: { type: number }
        sortOrder: { type: integer }
      required: [id, name, quantity, unitPrice, lineTotal, sortOrder]

    QuoteRevision:
      type: object
      properties:
        id: { type: integer }
        revisionNumber: { type: integer }
        note: { type: string, nullable: true }
        snapshot: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
      required: [id, revisionNumber, snapshot, createdAt]

    QuoteFull:
      allOf:
        - $ref: "#/components/schemas/Quote"
        - type: object
          properties:
            customer:
              nullable: true
              $ref: "#/components/schemas/Customer"
            items:
              type: array
              items: { $ref: "#/components/schemas/QuoteItem" }
            revisions:
              type: array
              items: { $ref: "#/components/schemas/QuoteRevision" }
          required: [items, revisions]

    CreateQuoteItemRequest:
      type: object
      properties:
        productId: { type: integer, nullable: true }
        name: { type: string }
        description: { type: string, nullable: true }
        quantity: { type: number }
        unitPrice: { type: number }
      required: [name, quantity, unitPrice]

    CreateQuoteRequest:
      type: object
      properties:
        customerId: { type: integer, nullable: true }
        customerName: { type: string, nullable: true }
        customerContact: { type: string, nullable: true }
        customerEmail: { type: string, nullable: true }
        customerPhone: { type: string, nullable: true }
        customerAddress: { type: string, nullable: true }
        validUntil: { type: string, format: date-time, nullable: true }
        notes: { type: string, nullable: true }
        terms: { type: string, nullable: true }
        discount: { type: number }
        taxRate: { type: number }
        revisionNote: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/CreateQuoteItemRequest" }
      required: [items]

    SetQuoteStatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, sent, approved, rejected]
      required: [status]

    ConvertQuoteRequest:
      type: object
      properties:
        deadline: { type: string, format: date }
        priority:
          type: string
          enum: [low, normal, high, urgent]
      required: [deadline]

    QuoteStatusCounts:
      type: object
      properties:
        draft: { type: integer }
        sent: { type: integer }
        approved: { type: integer }
        rejected: { type: integer }
        converted: { type: integer }
      required: [draft, sent, approved, rejected, converted]
